<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Syncore Email Verifier — Console</title>
<style>
  :root {
    --bg: #f5f6f8; --panel: #ffffff; --ink: #1a1d21; --muted: #6b7280;
    --line: #e4e7eb; --accent: #2563eb; --accent-ink: #ffffff;
    --chip: #f0f2f5; --field: #ffffff;
    --ok: #15803d; --ok-bg: #dcfce7; --bad: #b91c1c; --bad-bg: #fee2e2;
    --warn: #b45309; --warn-bg: #fef3c7; --neutral: #4b5563; --neutral-bg: #e5e7eb;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1216; --panel: #171b21; --ink: #e6e9ee; --muted: #9aa4b2;
      --line: #262c34; --accent: #3b82f6; --accent-ink: #ffffff;
      --chip: #21272f; --field: #12161b;
      --ok: #4ade80; --ok-bg: #14351f; --bad: #f87171; --bad-bg: #3a1414;
      --warn: #fbbf24; --warn-bg: #3a2c0c; --neutral: #cbd5e1; --neutral-bg: #2a313a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 28px 20px 64px; }
  header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin: 0; font-weight: 650; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; }
  form { margin: 20px 0 8px; }
  .row { display: flex; gap: 10px; }
  input[type=email], input[type=text] {
    flex: 1; min-width: 0; padding: 12px 14px; font-size: 15px;
    background: var(--field); color: var(--ink);
    border: 1px solid var(--line); border-radius: 10px; outline: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
  button {
    padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer;
    background: var(--accent); color: var(--accent-ink);
    border: none; border-radius: 10px; white-space: nowrap;
  }
  button:disabled { opacity: .6; cursor: default; }
  .opts { margin-top: 10px; display: flex; align-items: center; gap: 8px; }
  .opts summary { cursor: pointer; color: var(--muted); font-size: 13px; list-style: none; user-select: none; }
  .opts summary::-webkit-details-marker { display: none; }
  .opts .field { margin-top: 8px; }
  .recent { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .recent button {
    background: var(--chip); color: var(--muted); font-weight: 500; font-size: 12.5px;
    padding: 5px 10px; border-radius: 999px;
  }
  .msg { margin-top: 18px; padding: 14px 16px; border-radius: 10px; font-size: 14px; }
  .msg.err { background: var(--bad-bg); color: var(--bad); }
  .card { margin-top: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .card .top { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .badge { font-weight: 700; font-size: 13px; letter-spacing: .02em; text-transform: uppercase; padding: 5px 12px; border-radius: 999px; }
  .b-ok { background: var(--ok-bg); color: var(--ok); }
  .b-bad { background: var(--bad-bg); color: var(--bad); }
  .b-warn { background: var(--warn-bg); color: var(--warn); }
  .b-neutral { background: var(--neutral-bg); color: var(--neutral); }
  .addr { font-weight: 600; font-size: 15px; word-break: break-all; }
  .reason { color: var(--muted); font-size: 13px; margin-left: auto; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1px; background: var(--line); }
  .metric { background: var(--panel); padding: 14px 16px; }
  .metric .k { color: var(--muted); font-size: 12px; }
  .metric .v { font-size: 20px; font-weight: 650; margin-top: 2px; }
  .sections { padding: 6px 20px 14px; }
  .section { padding: 12px 0; border-top: 1px solid var(--line); }
  .section:first-child { border-top: none; }
  .section h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 4px 0; font-size: 14px; vertical-align: top; }
  td.k { color: var(--muted); width: 44%; }
  td.v { font-variant-numeric: tabular-nums; word-break: break-word; }
  .yes { color: var(--ok); font-weight: 600; }
  .no { color: var(--muted); }
  details.raw { margin: 8px 20px 20px; }
  details.raw summary { cursor: pointer; color: var(--muted); font-size: 13px; }
  pre { margin: 10px 0 0; padding: 14px; background: var(--field); border: 1px solid var(--line); border-radius: 10px; overflow-x: auto; font: 12.5px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  footer { margin-top: 26px; color: var(--muted); font-size: 12px; text-align: center; }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Email Verifier</h1>
    <span class="sub">Syncore — verification console</span>
  </header>

  <form id="form" autocomplete="off">
    <div class="row">
      <input id="email" type="email" placeholder="name@example.com" autofocus required>
      <button id="go" type="submit">Verify</button>
    </div>
    <details class="opts">
      <summary>Auth token (only if the server requires one)</summary>
      <div class="field row">
        <input id="token" type="text" placeholder="Bearer token or API key">
      </div>
    </details>
    <div id="recent" class="recent"></div>
  </form>

  <div id="msg" class="msg err" style="display:none"></div>
  <div id="out"></div>

  <footer>
    POST <code>/v1/verifications</code> · same-origin · nothing is sent anywhere else.
  </footer>
</div>

<script>
(function () {
  "use strict";
  var form = document.getElementById("form");
  var emailEl = document.getElementById("email");
  var tokenEl = document.getElementById("token");
  var goEl = document.getElementById("go");
  var msgEl = document.getElementById("msg");
  var outEl = document.getElementById("out");
  var recentEl = document.getElementById("recent");
  var RKEY = "syncore.recent";

  // --- small DOM helpers (textContent only; never innerHTML with data) -------
  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }
  function badgeClass(status) {
    switch (status) {
      case "valid": return "b-ok";
      case "invalid": return "b-bad";
      case "risky": case "catch_all": return "b-warn";
      default: return "b-neutral";
    }
  }
  function fmt(v) {
    if (v === null || v === undefined || v === "") return { text: "—", cls: "no" };
    if (v === true) return { text: "yes", cls: "yes" };
    if (v === false) return { text: "no", cls: "no" };
    if (typeof v === "object") return { text: JSON.stringify(v), cls: "" };
    return { text: String(v), cls: "" };
  }
  function labelize(k) { return k.replace(/_/g, " "); }

  // --- recent lookups (localStorage) -----------------------------------------
  function loadRecent() {
    try { return JSON.parse(localStorage.getItem(RKEY)) || []; } catch (e) { return []; }
  }
  function pushRecent(email) {
    var list = loadRecent().filter(function (e) { return e !== email; });
    list.unshift(email);
    list = list.slice(0, 8);
    try { localStorage.setItem(RKEY, JSON.stringify(list)); } catch (e) {}
    renderRecent();
  }
  function renderRecent() {
    recentEl.textContent = "";
    loadRecent().forEach(function (email) {
      var b = el("button", null, email);
      b.type = "button";
      b.addEventListener("click", function () { emailEl.value = email; verify(email); });
      recentEl.appendChild(b);
    });
  }

  // --- rendering -------------------------------------------------------------
  function metric(k, v) {
    var m = el("div", "metric");
    m.appendChild(el("div", "k", k));
    m.appendChild(el("div", "v", v));
    return m;
  }
  function sectionTable(title, obj) {
    var s = el("div", "section");
    s.appendChild(el("h3", null, title));
    var t = el("table");
    Object.keys(obj).forEach(function (k) {
      var tr = el("tr");
      tr.appendChild(el("td", "k", labelize(k)));
      var f = fmt(obj[k]);
      var td = el("td", "v " + f.cls, f.text);
      tr.appendChild(td);
      t.appendChild(tr);
    });
    s.appendChild(t);
    return s;
  }
  function render(data) {
    outEl.textContent = "";
    var card = el("div", "card");

    // Header: status badge + address + reason.
    var top = el("div", "top");
    top.appendChild(el("span", "badge " + badgeClass(data.status), data.status || "unknown"));
    top.appendChild(el("span", "addr", data.email || emailEl.value));
    if (data.reason_code) top.appendChild(el("span", "reason", labelize(data.reason_code)));
    card.appendChild(top);

    // Metrics strip.
    var mt = el("div", "metrics");
    if (data.deliverability_score != null) mt.appendChild(metric("Deliverability", data.deliverability_score));
    if (data.confidence != null) mt.appendChild(metric("Confidence", data.confidence));
    mt.appendChild(metric("Retryable", data.retryable ? "yes" : "no"));
    mt.appendChild(metric("Suppressed", data.suppressed ? "yes" : "no"));
    card.appendChild(mt);

    // Every object-valued field becomes its own section (syntax, domain,
    // account, smtp, score_components, error, ... — adapts to the schema).
    var sections = el("div", "sections");
    Object.keys(data).forEach(function (k) {
      var v = data[k];
      if (v && typeof v === "object" && !Array.isArray(v)) {
        sections.appendChild(sectionTable(labelize(k), v));
      }
    });
    if (sections.children.length) card.appendChild(sections);

    // Raw JSON.
    var raw = el("details", "raw");
    raw.appendChild(el("summary", null, "Raw JSON"));
    raw.appendChild(el("pre", null, JSON.stringify(data, null, 2)));
    card.appendChild(raw);

    outEl.appendChild(card);
  }

  function showError(text) { msgEl.textContent = text; msgEl.style.display = "block"; }
  function clearError() { msgEl.style.display = "none"; msgEl.textContent = ""; }

  // --- verify ----------------------------------------------------------------
  function verify(email) {
    clearError();
    goEl.disabled = true;
    goEl.textContent = "Verifying…";
    var headers = { "Content-Type": "application/json" };
    var token = tokenEl.value.trim();
    if (token) headers["Authorization"] = "Bearer " + token;

    fetch("/v1/verifications", {
      method: "POST",
      headers: headers,
      body: JSON.stringify({ email: email })
    }).then(function (res) {
      return res.json().catch(function () { return null; }).then(function (body) {
        return { ok: res.ok, status: res.status, body: body };
      });
    }).then(function (r) {
      if (!r.body) { showError("HTTP " + r.status + " — no JSON body returned."); return; }
      // The API returns a full assessment even for invalid addresses, so render
      // any object body; only surface a banner when there is no assessment.
      if (r.ok || r.body.status) {
        render(r.body);
        pushRecent(email);
      } else {
        var e = r.body.error || {};
        showError("HTTP " + r.status + " — " + (e.message || e.code || "request failed"));
      }
    }).catch(function (err) {
      showError("Request failed: " + err.message + " (is the server running?)");
    }).then(function () {
      goEl.disabled = false;
      goEl.textContent = "Verify";
    });
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var email = emailEl.value.trim();
    if (email) verify(email);
  });

  renderRecent();
})();
</script>
</body>
</html>
