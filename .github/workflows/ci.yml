name: CI Actions  # don't edit while the badge was depend on this

on:
  push:
    branches:
      - main
    tags:
      - v*

  pull_request:
    branches:
      - main

jobs:
  build-vet-test:
    name: Build/Vet/Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          # Use the version declared in go.mod.
          go-version-file: 'go.mod'

      - name: Check formatting (CRLF-safe)
        shell: bash
        run: |
          set -euo pipefail
          # Check only tracked Go files, normalizing line endings so a CRLF-vs-LF
          # difference (this repo is developed on Windows) never produces a false
          # gofmt failure. Machine-generated files (the Go "// Code generated ...
          # DO NOT EDIT." convention) are skipped so pre-generated metadata cannot
          # cause a false positive. Only genuine formatting problems fail.
          bad=""
          while IFS= read -r f; do
            if head -n 5 "$f" | grep -qE '^// Code generated .* DO NOT EDIT\.$'; then
              continue
            fi
            if ! diff -q <(gofmt "$f" | tr -d '\r') <(tr -d '\r' < "$f") >/dev/null; then
              bad="$bad $f"
            fi
          done < <(git ls-files '*.go')
          if [ -n "$bad" ]; then
            echo "The following files are not gofmt-clean:$bad"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (deterministic, no public network)
        run: go test ./...

      - name: Test (race detector)
        run: go test -race ./...
